# portals.yml — Chase LaValley
# Scout routing map: tells the scout HOW to find jobs at each company.
#
# Discovery strategy (3 levels, all run and results are merged):
#   Level 1 — Playwright:      navigate careers_url directly (real-time, works on SPAs)
#   Level 2 — Greenhouse API:  fetch structured JSON (fast, Greenhouse companies only)
#   Level 3 — WebSearch:       broad search_queries with site: filters (new company discovery)
#
# Each company entry needs at minimum: name, careers_url, enabled.
# Add api: when the company uses Greenhouse — it's faster and more reliable than Playwright.
# scan_method: playwright (default) | websearch | greenhouse_api

# ---------------------------------------------------------------------------
# TITLE FILTER
# Applied to every job title found during discovery.
# Rule: at least 1 positive must match AND 0 negatives must match (case-insensitive).
# seniority_boost: title matches these get surfaced first but are not required.
# ---------------------------------------------------------------------------

title_filter:
  positive:
    # --- AI / ML roles ---
    - "AI Engineer"
    - "Machine Learning"
    - "ML Engineer"
    - "AI"
    - "LLM"
    - "Generative AI"
    - "Applied AI"
    - "AI Research"
    - "NLP"
    - "Computer Vision"
    - "MLOps"
    # --- Embedded / Hardware roles ---
    - "Embedded"
    - "Embedded Systems"
    - "Firmware"
    - "VHDL"
    - "FPGA"
    - "Hardware Engineer"
    - "Computer Engineer"
    - "Systems Engineer"
    - "Controls Engineer"
    # --- Broad engineering (catch-all for hybrid roles) ---
    - "Software Engineer"
    - "Automation Engineer"
    - "Robotics"

  negative:
    # Seniority gates (your experience_max_years is 2)
    - "Senior"
    - "Staff"
    - "Lead"
    - "Manager"
    - "Principal"
    - "Director"
    - "Head of"
    - "VP"
    # Stack mismatches
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Salesforce Admin"
    - "SAP"
    - "COBOL"
    - "Mainframe"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    # Role type mismatches
    - "Recruiter"
    - "Marketing"
    - "Sales"
    - "Designer"
    - "Technical Writer"

  seniority_boost:
    # These aren't blockers — just surfaced higher in your feed
    - "New Grad"
    - "Entry Level"
    - "Associate"
    - "Junior"
    - "University"
    - "2026"

# ---------------------------------------------------------------------------
# SEARCH QUERIES (Level 3 — WebSearch)
# Each query runs a web search. Use site: filters to target specific job boards.
# Good for discovering companies NOT in tracked_companies below.
# ---------------------------------------------------------------------------

search_queries:

  # --- AI Engineer roles on major boards ---
  - name: AI Engineer — Greenhouse
    query: 'site:job-boards.greenhouse.io "AI Engineer" OR "Machine Learning Engineer" "entry level" OR "new grad" OR "0-2 years"'
    enabled: true

  - name: AI Engineer — Lever
    query: 'site:jobs.lever.co "AI Engineer" OR "ML Engineer" "entry level" OR "new grad" Atlanta OR Macon OR remote'
    enabled: true

  - name: AI Engineer — Ashby
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "Applied AI" "entry level" OR "new grad" OR "university"'
    enabled: true

  # --- Embedded / Hardware roles ---
  - name: Embedded Engineer — Greenhouse
    query: 'site:job-boards.greenhouse.io "Embedded" OR "Firmware" OR "FPGA" OR "VHDL" "entry level" OR "new grad" OR "associate" Atlanta OR Georgia OR remote'
    enabled: true

  - name: Embedded Engineer — Lever
    query: 'site:jobs.lever.co "Embedded Systems" OR "Hardware Engineer" OR "Computer Engineer" "0-2 years" OR "new grad" Atlanta OR remote'
    enabled: true

  - name: Embedded / Hardware — Indeed aggregator
    query: '"Embedded Engineer" OR "Firmware Engineer" OR "Hardware Engineer" "new grad" OR "entry level" site:greenhouse.io OR site:lever.co Atlanta OR Georgia OR remote'
    enabled: true

  # --- Computer Engineering / Systems ---
  - name: Computer Engineer — Georgia + Remote
    query: '"Computer Engineer" OR "Systems Engineer" "entry level" OR "new grad" OR "0-2 years" Atlanta OR Macon OR Smyrna OR Georgia OR remote site:job-boards.greenhouse.io OR site:jobs.lever.co'
    enabled: true

  # --- ML / Computer Vision roles ---
  - name: ML Engineer — New Grad
    query: 'site:job-boards.greenhouse.io OR site:jobs.lever.co "Machine Learning" OR "Computer Vision" "new grad" OR "university hire" OR "entry level" 2026'
    enabled: true

  # --- Wellfound (startup-focused) ---
  - name: AI / ML — Wellfound startups
    query: 'site:wellfound.com "AI Engineer" OR "ML Engineer" OR "Embedded" "entry level" OR "new grad" remote OR Atlanta'
    enabled: true

